name: Snyk Security Pipeline — Nova Bank Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Snyk CLI + Delta
        run: |
          npm install -g snyk
          npm install -g snyk-delta

     
      # Dependency vulnerability scan
      
      - name: Snyk test — scan vulnerabilities
        continue-on-error: true
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      
      # Infrastructure as Code scan
     
      - name: Snyk IaC — scan infrastructure configs
        continue-on-error: true
        run: snyk iac test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

     
      # Delta scan (new vulnerabilities vs baseline)
     
      - name: Snyk delta — detect new issues
        continue-on-error: true
        run: snyk delta
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

     
      # Create/update security baseline
     
      - name: Snyk monitor — create dashboard snapshot
        run: snyk monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
